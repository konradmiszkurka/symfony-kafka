# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Shared\Infrastructure\Bus\MessengerCommandBus:
        arguments:
            $commandBus: '@command.bus'

    App\Shared\Application\Bus\CommandBusInterface:
        alias: App\Shared\Infrastructure\Bus\MessengerCommandBus

    App\Shared\Infrastructure\Bus\MessengerQueryBus:
        arguments:
            $queryBus: '@query.bus'

    App\Shared\Application\Bus\QueryBusInterface:
        alias: App\Shared\Infrastructure\Bus\MessengerQueryBus

    App\Identity\Domain\UserRepository:
        alias: App\Identity\Infrastructure\Doctrine\DoctrineUserRepository

    App\Identity\Application\PasswordHasher:
        alias: App\Identity\Infrastructure\Security\SymfonyPasswordHasher

    App\Catalog\Domain\CourseRepository:
        alias: App\Catalog\Infrastructure\Doctrine\DoctrineCourseRepository

    App\Shared\Infrastructure\Messenger\Kafka\KafkaTransportFactory:
        tags:
            - { name: messenger.transport_factory }

    App\Shared\Infrastructure\Bus\MessengerEventBus:
        arguments:
            $eventBus: '@event.bus'

    App\Shared\Application\Bus\EventBusInterface:
        alias: App\Shared\Infrastructure\Bus\OutboxEventBus

    App\Enrollment\Domain\EnrollmentRepository:
        alias: App\Enrollment\Infrastructure\Doctrine\DoctrineEnrollmentRepository

    App\Enrollment\Application\CourseAvailabilityChecker:
        alias: App\Enrollment\Infrastructure\Catalog\CatalogCourseAvailabilityChecker

    App\Progress\Domain\ProgressRepository:
        alias: App\Progress\Infrastructure\Doctrine\DoctrineProgressRepository

    App\Progress\Application\CourseStructureProvider:
        alias: App\Progress\Infrastructure\Catalog\CatalogCourseStructureProvider

    App\Notification\Domain\SentNotificationRepository:
        alias: App\Notification\Infrastructure\Doctrine\DoctrineSentNotificationRepository

    App\Notification\Infrastructure\Symfony\SymfonyMailer:
        arguments:
            $fromAddress: '%env(MAILER_FROM)%'

    App\Notification\Application\Mailer:
        alias: App\Notification\Infrastructure\Symfony\SymfonyMailer

    App\Notification\Application\RecipientResolver:
        alias: App\Notification\Infrastructure\Identity\IdentityRecipientResolver

    App\Shared\Infrastructure\Outbox\OutboxRepository:
        alias: App\Shared\Infrastructure\Outbox\DoctrineOutboxRepository

    App\Shared\Infrastructure\Outbox\OutboxRelay:
        arguments:
            $eventBus: '@event.bus'
